# Consolidated fast guards — one job, one checkout, one setup-node, several `--check`/`node --test`
# steps. Formerly 5 separate workflows (build-order-guard, doc-format-guard, scripts-guard,
# infra-guard, yaml-guard); merged 2026-07-16 as part of the local-first CI push (see
# Roadmap/09-platform-infra/github-actions-local-first/). Each of those individually ran in ~10-20
# real seconds but still billed a GitHub Actions minimum of 1 minute per job — up to 5 billed minutes
# for one PR touching several areas. One job with several steps bills ~1 minute total instead.
#
# PR-only (no `push` trigger) — this repo mostly commits direct-to-main for low-risk doc/tooling work,
# and that path is now covered by `.githooks/pre-commit` (same checks, run locally, free, instant).
# This workflow is the fallback safety net for anything that reaches a PR, or a commit made without
# the local hook active (e.g. `--no-verify`, a fresh clone before `npm install` ran `prepare`).
#
# Each step is path-gated via `changed-files`-style `git diff` against the PR base, so an
# infra-only PR doesn't burn time re-running the Roadmap checks, etc. — mirrors what the 5 separate
# workflows' own `paths:` triggers used to do, just inside one job instead of one trigger each.
name: guards

on:
  pull_request:
    paths:
      - 'Roadmap/**'
      - 'scripts/**'
      - 'infra/**'
      - '.github/workflows/**'

concurrency:
  group: guards-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guards:
    runs-on: ubuntu-latest
    permissions:
      contents: write # build-order self-heal pushes a regen commit back to the PR branch
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # build-order/doc-format's extractor derives dates from git history
          # Check out the PR HEAD (not the synthetic merge commit) so the build-order
          # self-heal can commit + push the regenerated board back to the PR branch.
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Detect changed areas
        id: areas
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base"...HEAD)
          {
            echo "roadmap=$(echo "$changed" | grep -qE '^(Roadmap/|scripts/(build-order|doc-format|roadmap-to-notion)\.mjs)' && echo true || echo false)"
            echo "scripts=$(echo "$changed" | grep -qE '^scripts/' && echo true || echo false)"
            echo "infra=$(echo "$changed" | grep -qE '^infra/' && echo true || echo false)"
            echo "workflows=$(echo "$changed" | grep -qE '^\.github/workflows/' && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: build-order — status board is fresh (self-heals stale boards)
        if: steps.areas.outputs.roadmap == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
          IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          if node scripts/build-order.mjs --check; then exit 0; fi
          # Self-heal (build-order-ci-self-heal epic): BUILD-ORDER.md is DERIVED from epic
          # frontmatter — a stale board is a forgotten `node scripts/build-order.mjs`, not a
          # judgment call. Regenerate and push the one derived file back to the PR branch
          # instead of redding the PR. GITHUB_TOKEN pushes don't retrigger workflows, so this
          # run's own green is the healed verdict (no recursion possible).
          if [ "$IS_FORK" = "true" ]; then
            echo "::error::BUILD-ORDER.md is stale and this is a fork PR (cannot push a heal commit). Run 'node scripts/build-order.mjs' locally and commit the result."
            exit 1
          fi
          node scripts/build-order.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Roadmap/00-ideas/BUILD-ORDER.md
          git commit -m "chore(build-order): self-heal — regenerate derived board" -- Roadmap/00-ideas/BUILD-ORDER.md
          git push origin HEAD:"$HEAD_REF"
          node scripts/build-order.mjs --check

      - name: doc-format — Roadmap doc canonical shape (enforced paths only)
        if: steps.areas.outputs.roadmap == 'true'
        run: node scripts/doc-format.mjs --check

      - name: scripts/ — CLI/tooling node:test
        if: steps.areas.outputs.scripts == 'true'
        run: node --test 'scripts/lib/*.test.mjs' 'scripts/*.test.mjs'

      - name: infra/ — deploy-invariants node:test
        if: steps.areas.outputs.infra == 'true'
        run: node --test infra/gcp/test/*.test.js infra/gcp/test/*.test.mjs

      - name: yaml — actionlint on workflow files
        if: steps.areas.outputs.workflows == 'true'
        env:
          ACTIONLINT_VERSION: '1.7.12'
        shell: bash
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION"
          ./actionlint -color
