# YAML lint — semantic checks on GitHub Actions workflow files that a syntax-only YAML parser can't
# catch (bad `uses:` refs, invalid `needs:`, typo'd `${{ }}` context expressions, shellcheck on inline
# `run:` blocks). This repo has no deploy-critical non-workflow YAML (unlike the two app repos, which
# also get a js-yaml parse guard on their cloudbuild.yaml — see apps/miyagisanchez/lib/yaml-audit.ts
# and apps/backend/src/lib/yaml-audit.ts), so actionlint alone covers this repo's full YAML surface.
#
# Pure node/binary, zero npm dependency — same "zero-install guard workflow" shape as
# build-order-guard.yml / scripts-guard.yml / infra-guard.yml.
#
# There is no official reusable "actionlint action" — actionlint's own docs (docs/usage.md) recommend
# downloading the release binary via its download script. The actionlint VERSION is pinned explicitly
# below (matching both app repos' identical yaml-guard.yml); the tiny download-script wrapper itself is
# fetched unpinned from the tool's own `main` branch (its documented, standard install method).
#
# ADVISORY for now (continue-on-error) — no findings verified yet against this repo's workflow files.
# Flip to required after one green cycle, matching this repo's standing convention for rolling out a
# new guard (see build-order-guard.yml's own history).
name: yaml-guard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

env:
  ACTIONLINT_VERSION: '1.7.12'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION"
      - name: Check workflow files
        shell: bash
        continue-on-error: true
        run: ${{ steps.get_actionlint.outputs.executable }} -color
