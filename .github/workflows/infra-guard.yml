# Backend Production Readiness — Sprint 4, Story 4.2.
# Deterministic drift guard for the infra hardening invariants. Infra isn't
# Playwright-gated, so this is the safety net: it fails CI if a future change
# erodes the S3 probe/CORS gains or the S4 env/secret reconcile (see
# infra/gcp/test/deploy-invariants.test.js and tasks/backend-recovery-runbook.md §4).
#
# Pure node:test, zero dependencies — no install step needed.
name: infra-guard

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-guard.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-guard.yml'

jobs:
  deploy-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run infra drift guard
        run: node --test infra/gcp/test/*.test.js
