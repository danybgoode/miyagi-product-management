  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

esk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ee056bfb-c604-4502-9e65-2e323d0ddcc2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5b199d02-833d-4fbc-9308-2ced430a8a0f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"35724a20-824b-4b5b-82cd-6d5d1d3dfff7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ee056bfb-c604-4502-9e65-2e323d0ddcc2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ============================================================ TOKENS */\n:root{\n  --paper:#f4f1e8;        /* warm newsprint */\n  --paper-2:#ece5d4;\n  --ink:#16160f;\n  --selva:#1d6f42;\n  --selva-ink:#114128;\n  --selva-deep:#061a0f;\n  --selva-soft:#dfe9df;\n  --hibisco:#b04341;      /* the one hot accent */\n  --hibisco-deep:#8b3331;\n  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;\n  --sans:'Space Grotesk',system-ui,sans-serif;\n  --punk:'Anton','Space Grotesk',system-ui,sans-serif;\n  --serif:'PT Serif',Georgia,'Times New Roman',serif;\n}\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{\n  background:#3a3a36;\n  font-family:var(--sans);\n  color:var(--ink);\n  -webkit-font-smoothing:antialiased;\n}\n\n/* ============================================================ SCREEN CHROME */\n.workspace{\n  min-height:100vh;\n  padding:40px 24px 90px;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  gap:14px;\n}\n.masthead{\n  width:100%;max-width:1056px;color:#d9d6cc;\n  display:flex;justify-content:space-between;align-items:flex-end;\n  gap:24px;flex-wrap:wrap;border-bottom:1px solid #555;padding-bottom:14px;margin-bottom:8px;\n}\n.masthead h1{\n  font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.14em;\n  text-transform:uppercase;margin:0;color:#fff;\n}\n.masthead p{font-family:var(--mono);font-size:11px;letter-spacing:.04em;margin:4px 0 0;color:#9c998f;max-width:520px;line-height:1.5;}\n.legend{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#b6b3a8;text-transform:uppercase;}\n.legend span{display:inline-flex;align-items:center;gap:6px;}\n.legend i{width:11px;height:11px;display:inline-block;border-radius:2px;}\n\n.sheet-label{\n  width:1056px;max-width:100%;color:#cfccc2;font-family:var(--mono);\n  font-size:11px;letter-spacing:.1em;text-transform:uppercase;\n  display:flex;align-items:center;gap:12px;margin-top:18px;\n}\n.sheet-label b{color:#fff;font-weight:700;}\n.sheet-label .rule{flex:1;height:1px;background:#555;}\n\n/* ============================================================ SHEET */\n.sheet{\n  width:1056px;height:816px;       /* 11in x 8.5in @96dpi */\n  background:var(--paper);\n  position:relative;\n  display:grid;\n  grid-template-columns:1fr 1fr 1fr;\n  box-shadow:0 24px 60px -20px rgba(0,0,0,.6);\n  overflow:hidden;\n  flex:none;\n}\n/* paper grain + global halftone wash */\n.sheet::before{\n  content:\"\";position:absolute;inset:0;z-index:0;pointer-events:none;\n  background-image:\n    radial-gradient(rgba(22,22,15,.045) 1px, transparent 1.4px);\n  background-size:5px 5px;\n  mix-blend-mode:multiply;opacity:.6;\n}\n.sheet::after{\n  content:\"\";position:absolute;inset:0;z-index:60;pointer-events:none;\n  box-shadow:inset 0 0 0 1px rgba(22,22,15,.18);\n}\n.panel{\n  position:relative;z-index:1;\n  padding:40px 34px;\n  display:flex;flex-direction:column;\n  overflow:hidden;\n}\n.panel + .panel{border-left:1px dashed rgba(22,22,15,.28);}\n\n/* fold tick markers — screen only */\n.fold-tick{\n  position:absolute;top:0;width:0;height:100%;z-index:50;pointer-events:none;\n}\n.fold-tick::before,.fold-tick::after{\n  content:\"▽\";position:absolute;left:50%;transform:translateX(-50%);\n  font-size:11px;color:rgba(22,22,15,.4);\n}\n.fold-tick::before{top:-2px;}\n.fold-tick::after{bottom:-4px;content:\"△\";}\n.fold-1{left:33.333%;}\n.fold-2{left:66.666%;}\n\n/* panel role caption — screen only, sits over trim */\n.role{\n  position:absolute;top:8px;left:50%;transform:translateX(-50%);\n  z-index:55;font-family:var(--mono);font-size:9px;letter-spacing:.12em;\n  text-transform:uppercase;color:var(--selva);\n  background:rgba(244,241,232,.85);padding:2px 8px;border:1px solid var(--selva);\n  border-radius:99px;white-space:nowrap;\n}\n\n/* ============================================================ SHARED PUNK ELEMENTS */\n.eyebrow{\n  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;\n  text-transform:uppercase;color:var(--selva);margin:0;\n}\n.eyebrow.red{color:var(--hibisco);}\n.kicker-bar{\n  display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:var(--paper);\n  font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.13em;\n  text-transform:uppercase;padding:5px 9px;align-self:flex-start;\n}\n.kicker-bar.green{background:var(--selva);}\n.kicker-bar.red{background:var(--hibisco);}\n\n.headline{\n  font-family:var(--punk);font-weight:400;line-height:.9;\n  text-transform:uppercase;letter-spacing:.005em;margin:0;color:var(--ink);\n}\n.script{\n  font-family:var(--sans);font-style:italic;font-weight:500;color:var(--selva-ink);\n  letter-spacing:-.01em;\n}\n.body{font-size:13.5px;line-height:1.5;color:var(--ink);margin:0;}\n.body.sm{font-size:12px;line-height:1.46;}\n.mono-note{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:#5d5b4f;line-height:1.5;}\n\n.rule-thick{height:5px;background:var(--ink);border:none;margin:0;}\n.rule-green{height:3px;background:var(--selva);border:none;margin:0;}\n.rule-dot{height:0;border:none;border-top:2px dotted var(--ink);margin:0;}\n\n/* misregistration / overprint headline */\n.overprint{position:relative;display:inline-block;}\n.overprint::before{\n  content:attr(data-ghost);position:absolute;left:2px;top:1.5px;\n  color:var(--hibisco);opacity:.85;z-index:-1;mix-blend-mode:multiply;\n}\n\n/* halftone burst sticker */\n.sticker{\n  position:absolute;width:104px;height:104px;border-radius:50%;\n  background:var(--hibisco);color:var(--paper);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  text-align:center;transform:rotate(-11deg);\n  box-shadow:0 6px 0 rgba(22,22,15,.18);\n  border:2px solid var(--ink);\n}\n.sticker .big{font-family:var(--punk);font-size:30px;line-height:.82;white-space:nowrap;letter-spacing:.01em;}\n.sticker .sm{font-family:var(--mono);font-size:7.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:3px;white-space:nowrap;}\n\n/* ============================================================ PHOTO WELL (placeholder) */\n.photo{\n  position:relative;background:var(--selva-deep);overflow:hidden;\n  border:2px solid var(--ink);\n  display:flex;align-items:flex-end;\n}\n.photo::before{ /* duotone halftone dots */\n  content:\"\";position:absolute;inset:0;\n  background-image:radial-gradient(var(--selva) 30%, transparent 31%);\n  background-size:9px 9px;background-position:0 0;opacity:.55;\n}\n.photo::after{ /* diagonal hatch */\n  content:\"\";position:absolute;inset:0;\n  background-image:repeating-linear-gradient(45deg, rgba(244,241,232,.10) 0 2px, transparent 2px 11px);\n}\n.photo .tag{\n  position:relative;z-index:2;margin:8px;\n  font-family:var(--mono);font-size:9px;letter-spacing:.05em;\n  color:var(--paper);background:rgba(22,22,15,.72);\n  padding:5px 8px;line-height:1.45;border-left:3px solid var(--hibisco);\n}\n.photo .tag b{color:#fff;letter-spacing:.1em;}\n.photo .corner{\n  position:absolute;top:6px;right:6px;z-index:2;\n  font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--paper);\n  border:1px solid rgba(244,241,232,.5);padding:2px 5px;text-transform:uppercase;\n}\n\n/* ============================================================ QR (placeholder) */\n.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}\n.qr{\n  background:#fff;border:2px solid var(--ink);padding:6px;position:relative;\n}\n.qr svg{display:block;}\n.qr .ph{\n  position:absolute;top:-8px;right:-8px;\n  font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.1em;\n  background:var(--hibisco);color:#fff;padding:2px 5px;transform:rotate(6deg);\n  border:1px solid var(--ink);text-transform:uppercase;\n}\n.qr-cap{font-family:var(--mono);font-size:8.5px;letter-spacing:.02em;color:var(--ink);text-align:center;line-height:1.35;}\n.qr-cap b{color:var(--selva);}\n\n/* ============================================================ EDITABLE PLACEHOLDER BLOCK */\n.editable{\n  border:1.5px dashed var(--hibisco);background:rgba(176,67,65,.05);\n  padding:11px 12px;position:relative;\n}\n.editable .flag{\n  position:absolute;top:-9px;left:9px;background:var(--hibisco);color:#fff;\n  font-family:var(--mono);font-size:7.5px;font-weight:700;letter-spacing:.12em;\n  text-transform:uppercase;padding:2px 6px;\n}\n.editable .placeholder-copy{color:#6c5350;font-style:italic;font-size:12px;line-height:1.5;}\n\n/* ============================================================ FRONT COVER (A) */\n.cover{background:var(--paper);justify-content:space-between;padding-top:34px;}\n.cover-top{display:flex;flex-direction:column;gap:10px;position:relative;z-index:2;}\n.cover-hero{position:relative;z-index:2;margin-top:10px;}\n.cover-hero .m{\n  font-family:'Monoton';font-size:50px;line-height:1;display:block;width:max-content;\n  text-transform:uppercase;letter-spacing:.01em;color:var(--selva);\n  transform:skewX(-9deg);transform-origin:left bottom;\n}\n.cover-hero .num{\n  font-family:'Monoton';font-size:96px;line-height:.86;display:block;width:max-content;margin-top:12px;\n  letter-spacing:.01em;color:var(--hibisco);\n  transform:skewX(-9deg);transform-origin:left bottom;\n}\n.cover-hero .joyas{\n  font-family:var(--sans);font-style:italic;font-weight:600;font-size:30px;\n  color:var(--ink);margin-top:6px;letter-spacing:-.01em;\n}\n.cover-sub{\n  font-family:var(--punk);font-size:33px;line-height:.9;color:var(--ink);\n  text-transform:uppercase;margin-top:15px;position:relative;z-index:2;max-width:280px;letter-spacing:.005em;\n}\n.cover-sub .hot{color:var(--selva);}\n.cover-foot{position:relative;z-index:2;display:flex;flex-direction:column;gap:9px;}\n.logo-lockup{display:flex;align-items:center;gap:8px;}\n.logo-mark{\n  width:30px;height:30px;border-radius:7px;flex:none;\n  background:linear-gradient(135deg,var(--selva) 0 49%,var(--paper) 49% 51%,var(--ink) 51% 100%);\n  box-shadow:0 0 0 1px var(--ink);\n}\n.logo-word{font-family:var(--sans);font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--ink);}\n.logo-word .dot{color:var(--selva);}\n.cover-halftone{\n  position:absolute;right:-40px;bottom:-30px;width:300px;height:300px;z-index:1;pointer-events:none;\n  background-image:radial-gradient(var(--selva) 32%, transparent 33%);\n  background-size:14px 14px;\n  -webkit-mask-image:radial-gradient(circle at 70% 70%, #000 38%, transparent 62%);\n  mask-image:radial-gradient(circle at 70% 70%, #000 38%, transparent 62%);\n  opacity:.35;\n}\n\n/* ============================================================ MANIFESTO (B) */\n.man-title{font-size:38px;margin-top:8px;}\n.credo{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}\n.credo li{display:flex;gap:9px;align-items:baseline;font-size:12.5px;line-height:1.4;}\n.credo .n{font-family:var(--mono);font-weight:700;font-size:11px;color:var(--hibisco);flex:none;}\n.pull{\n  font-family:var(--punk);font-size:42px;line-height:.92;color:var(--hibisco);\n  text-transform:uppercase;margin:0;\n}\n.big-zero{\n  font-family:var(--punk);font-size:120px;line-height:.74;color:var(--selva);\n  display:flex;align-items:baseline;gap:4px;\n}\n.big-zero small{font-family:var(--sans);font-weight:700;font-size:17px;color:var(--ink);line-height:1.1;text-transform:uppercase;letter-spacing:-.01em;}\n\n/* ============================================================ BACK COVER (F) */\n.back{justify-content:space-between;}\n.homage{\n  border:2px solid var(--ink);position:relative;padding:13px 13px 12px;\n  background:var(--selva-soft);\n}\n.homage .crest{\n  position:absolute;top:10px;right:11px;width:26px;height:26px;border:2px solid var(--selva-ink);\n  display:flex;align-items:center;justify-content:center;\n  background:repeating-linear-gradient(45deg,var(--selva-ink) 0 3px,transparent 3px 6px);\n}\n.homage h4{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--selva-ink);margin:0 30px 7px 0;}\n.colophon{font-family:var(--mono);font-size:8px;letter-spacing:.03em;color:#6b6859;line-height:1.55;}\n\n/* ============================================================ GEMS (C) */\n.gems-head{display:flex;flex-direction:column;gap:5px;}\n.gems-title{font-size:24px;}\n.gem-list{display:flex;flex-direction:column;margin-top:5px;}\n.gem{\n  display:grid;grid-template-columns:1fr 50px;gap:9px;\n  padding:4p transform:uppercase;color:var(--ink);background:var(--paper);\n  padding:2px 5px;border:1px solid var(--ink);\n}\n.art-body{\n  font-family:var(--serif);font-size:10.5px;line-height:1.46;text-align:justify;\n  hyphens:auto;-webkit-hyphens:auto;color:var(--ink);margin:0;\n}\n.art-body + .art-body{margin-top:5px;text-indent:12px;}\n.art-body.lead::first-letter{\n  font-family:var(--punk);font-size:33px;line-height:.66;float:left;\n  margin:4px 5px 0 0;color:var(--selva);\n}\n.art-rule{height:3px;background:var(--ink);border:none;margin:8px 0;}\n.art-rule.thin{height:1px;}\n.sidebar-box{\n  border:2px solid var(--ink);padding:9px 11px;background:var(--paper-2);\n}\n.sidebar-box h5{font-family:var(--punk);font-size:17px;text-transform:uppercase;margin:0 0 6px;line-height:.88;}\n.mini-credo{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}\n.mini-credo li{display:flex;gap:7px;font-family:var(--serif);font-size:10.5px;line-height:1.25;}\n.mini-credo .n{font-family:var(--mono);font-weight:700;font-size:9px;color:var(--hibisco);flex:none;}\n\n/* ============================================================ PRINT */\n@media print{\n  @page{size:11in 8.5in;margin:0;}\n  body{background:#fff;}\n  .workspace{padding:0;gap:0;}\n  .masthead,.legend,.sheet-label,.fold-tick,.role{display:none !important;}\n  .sheet{box-shadow:none;width:11in;height:8.5in;page-break-after:always;break-after:page;}\n  .sheet:last-of-type{page-break-after:auto;break-after:auto;}\n  .panel + .panel{border-left:none;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"workspace\">\n\n  <div class=\"masthead\">\n    <div>\n      <h1>México 26 — Las Joyas Escondidas<\u002Fh1>\n      <p>Tríptico (trifold) · Carta horizontal 11×8.5\" · doble cara · Miyagi Sánchez. Imposición plegada: el tríptico se arma doblando el panel derecho hacia adentro y el izquierdo encima.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"legend\">\n      <span><i style=\"background:#1d6f42;\"><\u002Fi>Sel g.setAttribute('viewBox','0 0 '+px+' '+px);\n  // finder pattern positions\n  const finders=[[0,0],[N-7,0],[0,N-7]];\n  function isFinder(x,y){\n    for(const [fx,fy] of finders){\n      if(x>=fx&&x<fx+7&&y>=fy&&y<fy+7) return true;\n      if(x>=fx-1&&x<fx+8&&y>=fy-1&&y<fy+8) return 'quiet';\n    }\n    return false;\n  }\n  for(let y=0;y<N;y++){\n    for(let x=0;x<N;x++){\n      const f=isFinder(x,y);\n      if(f==='quiet') continue;\n      let on=false;\n      if(f===true){\n        const lx=x-(x>=N-7?N-7:0), ly=y-(y>=N-7?N-7:0);\n        on=(lx===0||lx===6||ly===0||ly===6)||(lx>=2&&lx<=4&&ly>=2&&ly<=4);\n      } else {\n        on=rand()>0.52;\n      }\n      if(on){\n        const r=document.createElementNS(ns,'rect');\n        r.setAttribute('x',(x*cell).toFixed(2));\n        r.setAttribute('y',(y*cell).toFixed(2));\n        r.setAttribute('width',(cell+0.4).toFixed(2));\n        r.setAttribute('height',(cell+0.4).toFixed(2));\n        r.setAttribute('fill','#16160f');\n        svg.appendChild(r);\n      }\n    }\n  }\n  el.appendChild(svg);\n}\ndocument.querySelectorAll('.qr[data-qr]').forEach(buildQR);\n\n/* ---- screen-fit scaling for the two sheets ---- */\nfunction fit(){\n  const sheets=document.querySelectorAll('.sheet');\n  const avail=Math.min(window.innerWidth-48,1056);\n  const scale=avail/1056;\n  sheets.forEach(s=>{\n    s.style.transform='scale('+scale+')';\n    s.style.transformOrigin='top left';\n    s.style.marginBottom=(816*scale-816)+'px';\n    s.style.marginRight=(1056*scale-1056)+'px';\n  });\n}\nwindow.addEventListener('resize',fit);\nfit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
